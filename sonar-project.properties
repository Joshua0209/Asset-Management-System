# SonarQube project configuration.
# Server URL + auth token come from CI secrets (SONAR_HOST_URL + SONAR_TOKEN).

sonar.projectKey=Joshua0209_Asset-Management-System
sonar.projectName=Asset Management System
sonar.projectVersion=0.1.0

# Source layout
sonar.sources=backend/app,frontend/src
sonar.tests=backend/tests
sonar.test.inclusions=backend/tests/**/*.py

# Language-specific
sonar.python.version=3.11
sonar.python.coverage.reportPaths=backend/coverage.xml
sonar.typescript.tsconfigPath=frontend/tsconfig.json

# Encoding + exclusions
sonar.sourceEncoding=UTF-8
sonar.exclusions=**/node_modules/**,**/.venv/**,**/dist/**,**/build/**,**/__pycache__/**,**/alembic/versions/**,frontend/package-lock.json
