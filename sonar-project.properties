# SonarQube / SonarCloud project configuration.
# Host URL is hardcoded in the workflow (https://sonarcloud.io).
# Only SONAR_TOKEN is a required CI secret.

sonar.projectKey=Joshua0209_Asset-Management-System
sonar.organization=joshua0209
sonar.projectName=Asset Management System
sonar.projectVersion=0.1.0

# Source layout
sonar.sources=backend/app,frontend/src
sonar.tests=backend/tests,frontend/src/__tests__
sonar.test.inclusions=backend/tests/**/*.py,frontend/src/__tests__/**/*.{ts,tsx}

# Language-specific
sonar.python.version=3.11
sonar.python.coverage.reportPaths=backend/coverage.xml
sonar.typescript.tsconfigPath=frontend/tsconfig.json
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Encoding + exclusions
sonar.sourceEncoding=UTF-8
sonar.exclusions=**/node_modules/**,**/.venv/**,**/dist/**,**/build/**,**/__pycache__/**,**/alembic/versions/**,frontend/package-lock.json,docs/**,frontend/src/mocks/**
sonar.coverage.exclusions=frontend/src/__tests__/**,frontend/src/**/*.test.ts,frontend/src/**/*.test.tsx,backend/tests/**
