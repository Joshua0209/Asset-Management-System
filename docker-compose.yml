services:
  mysql:
    image: mysql:8.4
    container_name: ams-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: asset_management
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: ams-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      # Talks to mysql via the service hostname inside the compose network.
      DATABASE_URL: mysql+pymysql://root:password@mysql:3306/asset_management
      # Dev-only secret; override via an env file for anything outside the team.
      JWT_SECRET: dev-only-change-me-please
      # Browser origin is the host's published port, not the container.
      CORS_ALLOWED_ORIGINS: '["http://localhost:5173"]'
      CORS_ALLOWED_METHODS: '["GET","POST","PATCH","OPTIONS"]'
      CORS_ALLOWED_HEADERS: '["Authorization","Content-Type"]'
      # Rate limiting — slowapi in-memory; flip RATE_LIMIT_ENABLED to false
      # only for load testing where real limits would skew the run.
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_AUTHENTICATED: 100/minute
      RATE_LIMIT_ANONYMOUS: 30/minute
      RATE_LIMIT_IMAGES: 300/minute
      # Persisted via the named volume below so uploads survive restarts.
      # Lives outside /app so the bind mount on /app cannot mask the image's
      # app-owned mkdir that seeds the volume's initial permissions.
      REPAIR_UPLOAD_DIR: /var/lib/ams/uploads/repair-requests
    ports:
      - "8000:8000"
    volumes:
      # Bind-mount source so uvicorn --reload picks up host edits.
      - ./backend:/app
      # Named volume keeps repair-image uploads outside the /app bind mount,
      # which is what lets it inherit app-owned permissions from the image.
      - backend_uploads:/var/lib/ams/uploads
    # Migrations run on every start (idempotent). Seeding is destructive
    # (wipes all tables before re-seeding) and gated behind AMS_SEED_CONFIRM=1,
    # so it is a one-shot — see README "Option A" for the seeding command.
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      # /ready exercises DB connectivity (SELECT 1); /health is liveness only.
      # Compose uses readiness so `depends_on: service_healthy` blocks the
      # frontend until the DB-backed API is actually serving requests.
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/ready"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
    container_name: ams-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      # Browser-side requests; backend is published on the host's 8000.
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      # Anonymous volume preserves the image's installed node_modules from
      # being shadowed by the host bind mount above.
      - /app/node_modules

volumes:
  mysql_data:
  backend_uploads:
