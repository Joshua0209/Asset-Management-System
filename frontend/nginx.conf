# nginx config for the production frontend image.
#
# Two responsibilities:
#   1. Serve the Vite-built static bundle from /usr/share/nginx/html.
#   2. SPA fallback: any unknown path returns /index.html so React Router
#      can resolve it client-side. Without this, a hard refresh on /assets
#      or a deep link in an email would 404.
#
# Caching strategy follows Vite's hashed-filename convention: bundles
# under /assets/ are content-hashed and safe to cache for a year, while
# /index.html must stay fresh so deploys propagate immediately.

server {
    listen       80;
    server_name  _;

    # SPA fallback — deep links resolve to index.html, which boots React
    # and lets the client router take over.
    root   /usr/share/nginx/html;
    index  index.html;

    # Hashed bundles are immutable; cache aggressively.
    location /assets/ {
        access_log off;
        expires    1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files  $uri =404;
    }

    # index.html must never be cached — it's how clients discover the new
    # bundle hash after a deploy.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hide nginx version in error pages and headers.
    server_tokens off;
}
